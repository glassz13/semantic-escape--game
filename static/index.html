<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xiwnb34t5</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #103c46;
    color: #ffffff;
    font-family: 'Consolas', 'Menlo', 'Monaco', monospace;
    font-size: 15px;
    line-height: 1.8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 80%;
    margin: 0 auto;
    padding: 0 20px;
  }
  #header { padding: 28px 0 4px; }
  #header h1 { font-size: 16px; font-weight: normal; }
  #header p  { font-size: 12px; opacity: 0.4; margin-top: 2px; }
  #terminal { flex: 1; padding: 20px 0; display: flex; flex-direction: column; }
  #intro-screen { flex: 1; }
  #game-screen { display: none; flex-direction: column; }
  #game-state { margin-bottom: 12px; }
  
#header h1 span {
  font-size: 12px;
  opacity: 0.4;
  font-weight: normal;
  margin-left: 12px;
}
  .i { font-style: italic; }
  .sep { opacity: 0.15; }
  .g { color: #4ec9b0; }
  .r { color: #f44747; }
  .y { color: #dcdcaa; }
  .input-row { display: flex; gap: 8px; }
  .input-row span { opacity: 0.4; }
  input[type=text] {
    background: transparent; border: none; outline: none;
    color: #ffffff;
    font-family: 'Consolas', 'Menlo', 'Monaco', monospace;
    font-size: 15px; flex: 1; caret-color: #fff;
  }
  #footer {
    padding: 16px 0 28px;
    border-top: 1px solid #2a2a2a;
    display: flex; align-items: center;
    gap: 14px; margin-top: auto; font-size: 12px;
  }
  #footer img { width: 32px; height: 32px; border-radius: 50%; filter: grayscale(100%); opacity: 0.5; }
  #footer a { color: #ffffff; text-decoration: none; }
</style>
</head>
<body>

<div id="header">
  <h1>xiwnb34t5qidn<span>escape the void</span></h1>
  <p>─────────────────────────────────────</p>
</div>

<div id="terminal">
  <div id="intro-screen">
    <div id="intro-output"></div>
    <div class="input-row" id="intro-input-row" style="display:none;">
      <span>&gt;</span>
      <input type="text" id="intro-input" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <div id="game-screen">
    <div id="game-state"></div>
    <div class="sep">─────────────────────────────────────</div>
    <div id="game-log"></div>
    <div class="input-row" id="game-input-row" style="display:none;">
      <span>&gt;</span>
      <input type="text" id="game-input" autocomplete="off" spellcheck="false">
    </div>
  </div>
</div>

<div id="footer">
  <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=cat&backgroundColor=1e1e1e" alt="cat">
  <div>
    <a href="https://ggg.com" target="_blank">ggg.com</a>
    &nbsp;bro woke up, typed "farm", got rejected, lost all lives, cried. we call this the human experience.💀
  </div>
</div>

<script>
let sessionId = null;
let gameStatus = 'intro';
let currentQuestion = null;

const introOut      = document.getElementById('intro-output');
const introInputRow = document.getElementById('intro-input-row');
const introInput    = document.getElementById('intro-input');
const gameScreen    = document.getElementById('game-screen');
const introScreen   = document.getElementById('intro-screen');
const gameState     = document.getElementById('game-state');
const gameLog       = document.getElementById('game-log');
const gameInputRow  = document.getElementById('game-input-row');
const gameInput     = document.getElementById('game-input');

function iPrint(text) {
  const d = document.createElement('div');
  d.textContent = text; introOut.appendChild(d);
  
}

function line(parent, text, cls) {
  const d = document.createElement('div');
  d.textContent = text;
  if (cls) d.className = cls;
  parent.appendChild(d);
}

function logClear() { gameLog.innerHTML = ''; }

function logLine(text, cls) { line(gameLog, text, cls); }

function showGameInput() {
  gameInputRow.style.display = 'flex';
  gameInput.value = ''; gameInput.focus();
}

function hideGameInput() { gameInputRow.style.display = 'none'; }

function updateState(data) {
  const idx = typeof data.current_room_index === 'number' ? data.current_room_index + 1 : 1;
  const thr = data.threshold !== undefined ? data.threshold : '—';
  gameState.innerHTML = '';
  line(gameState, `level ${idx}: ${(data.room_name || '').toLowerCase()}`,'y');
  line(gameState, `lives remaining  : ${data.lives}`);
  line(gameState, '');
  line(gameState, `start → ${(data.start_word || '').toUpperCase()}   target → ${(data.target_word || '').toUpperCase()}`,'y');
  line(gameState, `bridges required : ${(data.min_total || 5) - 2}   required strength : ${thr}`);
  line(gameState, '');
  line(gameState, `current path: ${(data.path || []).map(w => w.toUpperCase()).join(' → ')}`, 'i');
}

// ── INTRO ──
function showIntro() {
  gameStatus = 'intro';
  introOut.innerHTML = '';
  introScreen.style.display = 'block';
  gameScreen.style.display = 'none';
  iPrint('you are awakened in a dark forgotten realm.');
  iPrint('play the game to escape.');
  iPrint('─────────────────────────────────────');
  iPrint('how to play:  each word must relate to the previous one.');
  iPrint('  example: dog → wild → animal → predator → wolf');
  iPrint('─────────────────────────────────────');
  iPrint('press enter to begin.');
  introInputRow.style.display = 'flex';
  introInput.value = ''; introInput.focus();
}

// ── START ──
async function startGame() {
  introInputRow.style.display = 'none';
  introOut.innerHTML = '';
  iPrint('loading...');
  try {
    const res = await fetch('/start', { method: 'POST' });
    const data = await res.json();
    sessionId = data.session_id;
    gameStatus = 'playing';
    introScreen.style.display = 'none';
    gameScreen.style.display = 'flex';
    gameScreen.style.flexDirection = 'column';
    logClear();
    updateState(data);
    showGameInput();
  } catch(e) {
    iPrint('connection failed. refresh the page.');
    introInputRow.style.display = 'flex';
    introInput.focus();
  }
}

// ── SUBMIT WORD ──
async function submitWord(word) {
  if (!word.trim()) return;
  hideGameInput();
  try {
    const res = await fetch('/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, word })
    });
    const data = await res.json();
    updateState(data);
    logClear();
    logLine(`> ${word}`);
    logLine(data.message, data.success ? 'g' : 'r');

    if (data.status === 'game_over')                 { logLine(''); showGameOver(); return; }
    if (data.status === 'room_complete')              { logLine(''); showRiddlePrompt(); return; }
    if (data.status === 'awaiting_mandatory_riddle')  { logLine(''); showMandatoryRiddle(data.riddle_question, data.attempts_left); return; }

    showGameInput();
  } catch(e) {
    logClear(); logLine('network error. try again.', 'r'); showGameInput();
  }
}

// ── RIDDLE PROMPT ──
function showRiddlePrompt() {
  gameStatus = 'riddle_prompt';
  logLine('gate unlocked.', 'g');
  logLine('');
  logLine('a riddle awaits.');
  logLine('correct  →  +2 lives next realm');
  logLine('wrong    →  -1 life next realm');
  logLine('');
  logLine('attempt the riddle? (y/n)');
  showGameInput();
}

async function handleRiddlePrompt(answer) {
  hideGameInput();
  const choice = answer.trim().toLowerCase();
  const isYes = choice === 'y' || choice === 'yes';
  const res = await fetch('/riddle-option', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sessionId, choice: isYes ? 'y' : 'n' })
  });
  const data = await res.json();
  if (isYes) {
    gameStatus = 'riddle_optional';
    currentQuestion = data.riddle_question;
    logClear();
    logLine('riddle:');
    logLine('');
    logLine(data.riddle_question);
    logLine('');
    showGameInput();
  } else {
    gameStatus = 'playing';
    updateState(data);
    logClear();
    logLine('you pass through without answering.');
    showGameInput();
  }
}

// ── OPTIONAL RIDDLE ──
async function handleOptionalRiddle(answer) {
  hideGameInput();
  const res = await fetch('/riddle-answer', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sessionId, answer })
  });
  const data = await res.json();
  gameStatus = 'playing';
  updateState(data);
  logClear();
  logLine(data.correct ? 'correct.' : 'wrong.', data.correct ? 'g' : 'r');
  logLine(data.message);
  showGameInput();
}

// ── MANDATORY RIDDLE ──
function showMandatoryRiddle(question, attempts) {
  gameStatus = 'riddle_mandatory';
  currentQuestion = question;
  logLine('final seal.');
  logLine('');
  logLine('all gates fallen. one seal remains.');
  logLine(`attempts remaining: ${attempts}`);
  logLine('');
  logLine(question);
  logLine('');
  showGameInput();
}

async function handleMandatoryRiddle(answer) {
  hideGameInput();
  const res = await fetch('/riddle-answer', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sessionId, answer })
  });
  const data = await res.json();
  logClear();
  if (data.status === 'escaped') {
    logLine('correct.', 'g'); showEscaped();
  } else if (data.status === 'game_over') {
    logLine('wrong.', 'r'); showGameOver();
  } else {
    logLine('wrong.', 'r');
    logLine(`attempts remaining: ${data.attempts_left}`);
    logLine('');
    logLine(currentQuestion || '');
    showGameInput();
  }
}

// ── END ──
function showGameOver() {
  gameStatus = 'ended'; hideGameInput();
  logLine('you are consumed by the void.', 'r');
  logLine('game over!!!', 'r');
  logLine(''); logLine('press enter to try again.');
  showGameInput();
}

function showEscaped() {
  gameStatus = 'ended'; hideGameInput();
  logLine('the final seal shatters.', 'g');
  logLine('meaning aligns.', 'g');
  logLine('you have escaped the void.');
  logLine(''); logLine('press enter to play again.');
  showGameInput();
}

// ── EVENTS ──
introInput.addEventListener('keypress', async (e) => {
  if (e.key !== 'Enter') return;
  introInput.value = ''; await startGame();
});

gameInput.addEventListener('keypress', async (e) => {
  if (e.key !== 'Enter') return;
  const val = gameInput.value.trim();
  gameInput.value = '';
  if (gameStatus === 'ended')            { showIntro(); return; }
  if (!val)                              { return; }
  if (gameStatus === 'playing')          { await submitWord(val); return; }
  if (gameStatus === 'riddle_prompt')    { await handleRiddlePrompt(val); return; }
  if (gameStatus === 'riddle_optional')  { await handleOptionalRiddle(val); return; }
  if (gameStatus === 'riddle_mandatory') { await handleMandatoryRiddle(val); return; }
});

showIntro();
</script>
</body>
</html>
